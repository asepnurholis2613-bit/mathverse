<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcVerse Ultimate</title>

<!-- NERDAMER FULL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/nerdamer.core.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Algebra.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Calculus.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Solve.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    width:420px;
    padding:25px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    animation:fadeUp 0.7s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
}

.result{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    background:rgba(0,0,0,0.3);
}

.spinner{
    border:4px solid #ffffff22;
    border-top:4px solid #00c6ff;
    border-radius:50%;
    width:25px;
    height:25px;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

canvas{margin-top:20px;}
.history{margin-top:10px;font-size:12px;max-height:100px;overflow:auto;}
</style>
</head>

<body>

<div class="card">
<h2>🚀 CalcVerse Ultimate</h2>

<input id="fungsi" placeholder="Contoh: 2x^2 + 3x">

<select id="operasi">
<option value="turunan">Turunan</option>
<option value="integral">Integral</option>
<option value="limit">Limit (x→0)</option>
<option value="definite">Integral Tentu</option>
</select>

<input id="bawah" placeholder="Batas bawah (untuk integral tentu)">
<input id="atas" placeholder="Batas atas">

<button onclick="hitung()">Hitung</button>

<div id="hasil" class="result"></div>

<canvas id="grafik"></canvas>

<div id="history" class="history"></div>
</div>

<script>
let chart;

// FORMAT INPUT
function formatInput(str){
    return str
        .replace(/(\d)(x)/g,'$1*$2')
        .replace(/(\))(\d)/g,'$1*$2')
        .replace(/x\(/g,'x*(');
}

// HITUNG
function hitung(){
    let hasilBox=document.getElementById("hasil");
    hasilBox.innerHTML='<div class="spinner"></div>';

    let f=formatInput(document.getElementById("fungsi").value);
    let op=document.getElementById("operasi").value;
    let bawah=document.getElementById("bawah").value || "0";
    let atas=document.getElementById("atas").value || "1";

    setTimeout(()=>{
        try{
            let hasil;

            if(op==="turunan"){
                hasil = nerdamer.diff(f,'x').toString();
            }
            else if(op==="integral"){
                hasil = nerdamer.integrate(f,'x').toString();
            }
            else if(op==="limit"){
                hasil = nerdamer('limit('+f+', x, 0)').toString();
            }
            else if(op==="definite"){
                hasil = nerdamer('defint('+f+', x, '+bawah+', '+atas+')').toString();
            }

            hasilBox.innerHTML="✅ "+hasil;

            addHistory(f+" → "+hasil);
            grafik(f);

        }catch(e){
            hasilBox.innerHTML="❌ Error: "+e.message;
        }
    },600);
}

// GRAFIK
function grafik(f){
    let x=[],y=[];
    for(let i=-10;i<=10;i++){
        x.push(i);
        try{
            y.push(Number(nerdamer(f,{x:i}).evaluate().text()));
        }catch{
            y.push(null);
        }
    }

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("grafik"),{
        type:'line',
        data:{
            labels:x,
            datasets:[{
                label:'f(x)',
                data:y,
                tension:0.4
            }]
        }
    });
}

// HISTORY
function addHistory(t){
    let h=document.getElementById("history");
    h.innerHTML="📜 "+t+"<br>"+h.innerHTML;
}
</script>

</body>
</html>
