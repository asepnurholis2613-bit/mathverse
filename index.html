<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcVerse Ultra</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/nerdamer.core.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Calculus.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f2027;
    --bg2:#203a43;
    --bg3:#2c5364;
    --text:#fff;
}

body.light{
    --bg1:#f5f5f5;
    --bg2:#e0e0e0;
    --bg3:#ffffff;
    --text:#000;
}

body{
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* floating background glow */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle,#00c6ff55,transparent);
    animation: float 8s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translate(-50px,-50px);}
    50%{transform:translate(50px,50px);}
    100%{transform:translate(-50px,-50px);}
}

/* card */
.card{
    width:400px;
    padding:25px;
    border-radius:20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin:0;
}

.toggle{
    float:right;
    cursor:pointer;
    transition:0.3s;
}
.toggle:hover{
    transform:rotate(180deg);
}

/* input */
input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:var(--text);
    transition:0.3s;
}

input:focus{
    box-shadow:0 0 10px #00c6ff;
}

/* button */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00c6ff;
}

/* result */
.result{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    background:rgba(0,0,0,0.3);
    opacity:0;
    transform:translateY(10px);
    transition:0.4s;
}

.result.show{
    opacity:1;
    transform:translateY(0);
}

/* spinner */
.spinner{
    border:4px solid #ffffff22;
    border-top:4px solid #00c6ff;
    border-radius:50%;
    width:25px;
    height:25px;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* history */
.history{
    margin-top:10px;
    font-size:12px;
    max-height:100px;
    overflow:auto;
}

/* responsive */
@media(max-width:500px){
    .card{width:90%;}
}
</style>
</head>

<body>

<div class="card">

<div class="toggle" onclick="toggleMode()">🌗</div>

<h2>CalcVerse Ultra</h2>
<h3>Kalkulus</h3>

<input id="fungsi" placeholder="Contoh: 2x^2 + 3x">

<select id="operasi">
<option value="turunan">Turunan</option>
<option value="integral">Integral</option>
<option value="limit">Limit</option>
<option value="definite">Integral Tentu</option>
</select>

<input id="bawah" placeholder="Batas bawah">
<input id="atas" placeholder="Batas atas">

<button onclick="hitung()">Hitung</button>

<div id="hasil" class="result"></div>

<canvas id="grafik"></canvas>

<div id="history" class="history"></div>

</div>

<script>
let chart;

// auto format
function formatInput(str){
    return str.replace(/(\d)(x)/g,'$1*$2');
}

// dark mode
function toggleMode(){
    document.body.classList.toggle("light");
}

// hitung
function hitung(){
    let hasilBox=document.getElementById("hasil");
    hasilBox.classList.remove("show");
    hasilBox.innerHTML='<div class="spinner"></div>';

    let f=formatInput(document.getElementById("fungsi").value);
    let op=document.getElementById("operasi").value;
    let bawah=document.getElementById("bawah").value;
    let atas=document.getElementById("atas").value;

    setTimeout(()=>{
        try{
            let hasil;

            if(op==="turunan") hasil=nerdamer.diff(f,'x');
            else if(op==="integral") hasil=nerdamer.integrate(f,'x');
            else if(op==="limit") hasil=nerdamer.limit(f,'x',0);
            else hasil=nerdamer.integrate(f,'x',bawah,atas);

            hasilBox.innerHTML="✅ "+hasil.toString();
            hasilBox.classList.add("show");

            addHistory(f+" → "+hasil);
            grafik(f);

        }catch{
            hasilBox.innerHTML="❌ Error";
            hasilBox.classList.add("show");
        }
    },700);
}

// grafik
function grafik(f){
    let x=[],y=[];
    for(let i=-10;i<=10;i++){
        x.push(i);
        try{
            y.push(nerdamer(f,{x:i}).evaluate().text());
        }catch{y.push(null);}
    }

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("grafik"),{
        type:'line',
        data:{
            labels:x,
            datasets:[{
                label:'f(x)',
                data:y,
                tension:0.4
            }]
        }
    });
}

// history
function addHistory(t){
    let h=document.getElementById("history");
    h.innerHTML="📜 "+t+"<br>"+h.innerHTML;
}

</script>
<footer>
    <p>By @Asep N</p>
</footer>
</body>
</html>
